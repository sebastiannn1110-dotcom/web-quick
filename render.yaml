services:
  - type: web
    name: web-quick
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /en
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.6
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
